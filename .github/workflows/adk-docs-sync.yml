# Applies sync payload from docs repo. If client_payload.target_branch is set (e.g. adk-sync-test),
# checks out that branch and pushes there; otherwise uses default branch (prod).

name: ADK docs sync (apply payload)

on:
  repository_dispatch:
    types: [adk-docs-sync]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set target branch
        id: branch
        run: |
          TARGET="${{ github.event.client_payload.target_branch }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(git rev-parse --abbrev-ref HEAD)
          fi
          echo "branch=$TARGET" >> $GITHUB_OUTPUT
          echo "Target branch: $TARGET"

      - name: Checkout target branch
        if: steps.branch.outputs.branch != github.ref_name
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          git fetch origin "$BRANCH" 2>/dev/null || true
          if git show-ref --quiet refs/remotes/origin/"$BRANCH"; then
            git checkout "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

      - name: Write payload
        run: |
          python3 -c "
          import json, os
          p = json.loads(os.environ.get('CLIENT_PAYLOAD', '{}'))
          if p and 'skills' not in p and p.get('skill_name'):
            p = {'skills': [p]}
          if 'target_branch' in p:
            del p['target_branch']
          json.dump(p if p else {'skills': []}, open('/tmp/payload.json', 'w'))
          "
        env:
          CLIENT_PAYLOAD: ${{ toJSON(github.event.client_payload) }}

      - name: Apply sync payload
        id: apply
        run: python3 scripts/apply_sync_payload.py "$GITHUB_WORKSPACE" @/tmp/payload.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${{ steps.branch.outputs.branch }}"
          git diff --quiet && git diff --staged --quiet && echo "No changes to commit" || {
            git add -A
            git commit -m "chore(skills): sync from LYZR ADK docs [automated]"
            git push origin "$BRANCH"
          }
