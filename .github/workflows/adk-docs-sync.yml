# Applies sync payload from docs repo. Opens a PR into the target branch (default: client_payload.target_branch, else repo default).
# Set client_payload.direct_push: true to restore push-straight-to-base (no PR).

name: ADK docs sync (apply payload)

on:
  repository_dispatch:
    types: [adk-docs-sync]

permissions:
  contents: write
  pull-requests: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set target branch
        id: branch
        run: |
          TARGET="${{ github.event.client_payload.target_branch }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(git rev-parse --abbrev-ref HEAD)
          fi
          echo "branch=$TARGET" >> $GITHUB_OUTPUT
          echo "Target base branch (PR merge target): $TARGET"

      - name: Direct push mode (optional)
        id: mode
        run: |
          if [ "${{ github.event.client_payload.direct_push }}" = "true" ]; then
            echo "direct=true" >> $GITHUB_OUTPUT
          else
            echo "direct=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout target branch (direct push only)
        if: steps.mode.outputs.direct == 'true' && steps.branch.outputs.branch != github.ref_name
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          git fetch origin "$BRANCH" 2>/dev/null || true
          if git show-ref --quiet refs/remotes/origin/"$BRANCH"; then
            git checkout "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

      - name: Prepare sync branch (PR mode)
        id: sync_branch
        if: steps.mode.outputs.direct != 'true'
        run: |
          BASE="${{ steps.branch.outputs.branch }}"
          git fetch origin "$BASE" 2>/dev/null || true
          SYNC_BRANCH="sync/adk-docs-${{ github.run_id }}-${{ github.run_attempt }}"
          if git show-ref --quiet refs/remotes/origin/"$BASE"; then
            git checkout -B "$SYNC_BRANCH" "origin/$BASE"
          else
            echo "::warning::origin/$BASE not found; branching from current HEAD"
            git checkout -B "$SYNC_BRANCH"
          fi
          echo "sync_branch=$SYNC_BRANCH" >> $GITHUB_OUTPUT
          echo "Using branch $SYNC_BRANCH (PR → $BASE)"

      - name: Write payload
        run: |
          python3 -c "
          import json, os
          p = json.loads(os.environ.get('CLIENT_PAYLOAD', '{}'))
          if p and 'skills' not in p and p.get('skill_name'):
            p = {'skills': [p]}
          for k in ('target_branch', 'direct_push'):
            p.pop(k, None)
          json.dump(p if p else {'skills': []}, open('/tmp/payload.json', 'w'))
          "
        env:
          CLIENT_PAYLOAD: ${{ toJSON(github.event.client_payload) }}

      - name: Apply sync payload
        id: apply
        run: python3 scripts/apply_sync_payload.py "$GITHUB_WORKSPACE" @/tmp/payload.json

      - name: Commit and push (direct to base)
        if: steps.mode.outputs.direct == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${{ steps.branch.outputs.branch }}"
          git diff --quiet && git diff --staged --quiet && echo "No changes to commit" || {
            git add -A
            git commit -m "chore(skills): sync from LYZR ADK docs [automated]"
            git push origin "$BRANCH"
          }

      - name: Commit, push branch, open PR
        if: steps.mode.outputs.direct != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SYNC_BRANCH="${{ steps.sync_branch.outputs.sync_branch }}"
          BASE="${{ steps.branch.outputs.branch }}"
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit; skipping PR"
            exit 0
          fi
          git add -A
          git commit -m "chore(skills): sync from LYZR ADK docs [automated]"
          git push -u origin "$SYNC_BRANCH"
          {
            echo "Automated sync from LYZR ADK documentation (\`repository_dispatch\` \`adk-docs-sync\`)."
            echo ""
            echo "- **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Please review updates under \`skills/\` and merge when ready."
          } > /tmp/pr-body.md
          gh pr create \
            --base "$BASE" \
            --head "$SYNC_BRANCH" \
            --title "chore(skills): ADK docs → skills sync" \
            --body-file /tmp/pr-body.md
