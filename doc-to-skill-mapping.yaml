# Maps LYZR ADK doc paths to ide_skills and section headings.
# Used by the sync workflow to apply section-level updates only.
#
# path_prefix_rules: used only to warn when a doc is unmapped but the folder
#   would imply an existing skill — add an explicit mapping entry instead.
#
# new_skill_triggers: when a changed doc path starts with `path_prefix/` and
#   skills/<skill_name>/SKILL.md does NOT exist, build_sync_payload asks the LLM
#   for a full SKILL.md and emits new_skill + full_content (apply_sync_payload
#   creates the folder). Use this when ADK adds a new top-level doc area.

path_prefix_rules:
  agents: lyzr-agent
  studio: lyzr-agent
  overview: lyzr-agent
  providers: lyzr-agent
  responses: lyzr-agent
  exceptions: lyzr-agent
  streaming: lyzr-agent
  "structured-outputs": lyzr-agent
  tools: lyzr-agent
  contexts: lyzr-agent
  "knowledge-bases": lyzr-rag
  memory: lyzr-memory
  "rai-guardrails": lyzr-guardrails
  "file-image-output": lyzr-file-image-output

# Example when ADK adds a new folder (e.g. lyzr-adk/billing/*.mdx):
# new_skill_triggers:
#   - path_prefix: billing
#     skill_name: lyzr-billing
#     skill_title: "LYZR Billing"
# Also add billing: lyzr-billing under path_prefix_rules so future unmapped docs warn correctly.
new_skill_triggers: []

mappings:
  - doc_path: agents/creating-agents.mdx
    skill: lyzr-agent
    sections:
      - skill_heading: "## Step 2: Create an Agent"
  - doc_path: agents/managing-agents.mdx
    skill: lyzr-agent
