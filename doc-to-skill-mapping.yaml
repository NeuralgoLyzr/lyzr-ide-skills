# Maps LYZR ADK doc paths to ide_skills and section headings.
# Used by the sync workflow to apply section-level updates only.
# Default: if doc_path has no entry, use path_prefix_rules to resolve skill;
# new doc folders (no match) → generate new skill.

path_prefix_rules:
  agents: lyzr-agent
  studio: lyzr-agent
  overview: lyzr-agent
  providers: lyzr-agent
  responses: lyzr-agent
  exceptions: lyzr-agent
  streaming: lyzr-agent
  "structured-outputs": lyzr-agent
  tools: lyzr-agent
  contexts: lyzr-agent
  "knowledge-bases": lyzr-rag
  memory: lyzr-memory
  "rai-guardrails": lyzr-guardrails
  "file-image-output": lyzr-file-image-output

mappings:
  - doc_path: agents/creating-agents.mdx
    skill: lyzr-agent
    sections:
      - skill_heading: "## Step 2: Create an Agent"
  - doc_path: agents/managing-agents.mdx
    skill: lyzr-agent
    sections:
      - skill_heading: "## Agent Lifecycle Management"
  - doc_path: agents/running-agents.mdx
    skill: lyzr-agent
    sections:
      - skill_heading: "## Step 3: Run the Agent"
      - skill_heading: "## Streaming Responses"
      - skill_heading: "## Structured Outputs (Type-Safe Responses)"
